<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>复盘笔记 · 全部</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F7F5F3;--bg2:#FFFFFF;--bg3:#FAFAF9;--bg4:#F5F2EE;--border:#E5E2DE;--text:#2D2926;--text2:#5C5652;--text3:#8A8480;--accent:#D97706;--red:#DC2626;--green:#059669;--blue:#2563EB}
html{scroll-behavior:smooth}
body{font:15px/1.6 system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.header{position:sticky;top:0;z-index:100;background:rgba(247,245,243,.85);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;backdrop-filter:blur(12px)}
.header a{font-size:13px;color:var(--text2);text-decoration:none;padding:3px 10px;border-radius:6px;border:1px solid var(--border);transition:all .12s}
.header a:hover{color:var(--accent);border-color:var(--accent);background:var(--bg4)}
.header .title{font-size:17px;font-weight:700;color:var(--text)}
.header .sub{font-size:12px;color:var(--text3)}
.container{max-width:860px;margin:0 auto;padding:28px 24px 80px}
.month-group{margin-bottom:36px}
.month-label{font-size:15px;font-weight:700;color:var(--text);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:8px}
.month-label .yr{font-size:13px;font-weight:400;color:var(--text3)}
.day-list{display:flex;flex-direction:column;gap:8px}
.day-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--text);transition:all .12s;flex-wrap:wrap}
.day-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(217,119,6,.08)}
.day-card .d{font-size:14px;font-weight:600;min-width:90px;color:var(--text)}
.day-card .d .wd{font-size:11px;font-weight:400;color:var(--text3)}
.day-card .m{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--text2);flex:1}
.day-card .m span{padding:2px 8px;border-radius:6px;background:var(--bg4);white-space:nowrap}
.day-card .ar{font-size:12px;color:var(--text3)}
.up{color:var(--red)}.dn{color:var(--green)}
.tag{display:inline-block;padding:1px 7px;border-radius:5px;font-size:10px;font-weight:600}
.tag-red{background:rgba(220,38,38,.1);color:var(--red)}
.tag-green{background:rgba(5,150,105,.1);color:var(--green)}
.tag-amber{background:rgba(217,119,6,.1);color:var(--accent)}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty p{font-size:14px;margin-bottom:6px}
.footer{border-top:1px solid var(--border);padding:20px 24px;text-align:center;font-size:12px;color:var(--text3)}
@media(max-width:640px){.container{padding:16px}.day-card .m{width:100%}}
</style>
</head>
<body>

<div class="header">
  <a href="../">← 平台</a>
  <span class="title">复盘笔记</span>
  <span class="sub">全部记录</span>
</div>

<div class="container">

<!-- 2026年5月 -->
<div class="month-group">
  <div class="month-label">2026年5月 <span class="yr">05/13 更新</span></div>
  <div class="day-list">

    <a href="2026-05-13.html" class="day-card">
      <div class="d">5月13日<span class="wd"> 周三</span></div>
      <div class="m">
        <span>上证 <strong class="up">+0.67%</strong></span>
        <span>涨停 147</span>
        <span>情绪 <strong class="dn">58%</strong></span>
        <span>电力主线 · 6板大唐</span>
        <span class="tag tag-green">持仓 北华+立讯</span>
      </div>
      <div class="ar">→</div>
    </a>

    <a href="2026-05-12.html" class="day-card">
      <div class="d">5月12日<span class="wd"> 周二</span></div>
      <div class="m">
        <span>上证 <strong class="dn">-0.25%</strong></span>
        <span>涨停 94</span>
        <span>情绪 <strong class="up">25%</strong></span>
        <span>低迷 · 连板分层开放</span>
        <span class="tag tag-amber">持仓 北华</span>
      </div>
      <div class="ar">→</div>
    </a>

  </div>
</div>

</div>

</body>
</html>
