<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W20 第20周 · 复盘笔记</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F7F5F3;--bg2:#FFFFFF;--bg3:#FAFAF9;--bg4:#F5F2EE;--border:#E5E2DE;--text:#2D2926;--text2:#5C5652;--text3:#8A8480;--accent:#D97706;--red:#DC2626;--green:#059669;--blue:#2563EB;--purple:#7C3AED}
html{scroll-behavior:smooth}
body{font:15px/1.6 system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.header{position:sticky;top:0;z-index:100;background:rgba(247,245,243,.85);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;backdrop-filter:blur(12px)}
.header a{font-size:13px;color:var(--text2);text-decoration:none;padding:3px 10px;border-radius:6px;border:1px solid var(--border);transition:all .12s}
.header a:hover{color:var(--accent);border-color:var(--accent);background:var(--bg4)}
.header .title{font-size:17px;font-weight:700;color:var(--text)}
.header .sub{font-size:12px;color:var(--text3);margin-left:4px}
.container{max-width:800px;margin:0 auto;padding:24px 24px 64px}
.week-summary{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:28px;display:flex;gap:24px;flex-wrap:wrap;align-items:center}
.week-summary .stat{font-size:13px;color:var(--text2)}
.week-summary .stat strong{color:var(--text);font-size:15px}
.section-title{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.day-list{display:flex;flex-direction:column;gap:10px}
.day-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 20px;display:flex;align-items:center;gap:16px;text-decoration:none;color:var(--text);transition:all .15s;flex-wrap:wrap}
.day-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(217,119,6,.08)}
.day-card .date{font-size:15px;font-weight:700;min-width:80px;color:var(--text)}
.day-card .date .wd{font-size:12px;font-weight:400;color:var(--text3)}
.day-card .metrics{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text2);flex:1}
.day-card .metrics span{white-space:nowrap;padding:2px 8px;border-radius:6px;background:var(--bg4)}
.day-card .arrow{font-size:13px;color:var(--text3);margin-left:auto}
.chip{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.chip-red{background:rgba(220,38,38,.1);color:var(--red)}
.chip-green{background:rgba(5,150,105,.1);color:var(--green)}
.chip-amber{background:rgba(217,119,6,.1);color:var(--accent)}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:14px}
.footer{border-top:1px solid var(--border);padding:20px 24px;text-align:center;font-size:12px;color:var(--text3);margin-top:20px}
@media(max-width:640px){.container{padding:16px}.day-card .metrics{width:100%}}
</style>
</head>
<body>

<div class="header">
  <a href="../../">← 平台</a>
  <span class="title">W20 第20周</span>
  <span class="sub">复盘笔记</span>
</div>

<div class="container">

<div class="week-summary">
  <div class="stat"><strong>2</strong> 篇</div>
  <div class="stat">区间 <strong>5/12 – 5/13</strong></div>
  <div class="stat">周末 <strong>5/17-18</strong></div>
</div>

<div class="section-title">📆 按日复盘</div>

<div class="day-list">
  <a href="05-13.html" class="day-card">
    <div class="date">5/13<span class="wd"> 周三</span></div>
    <div class="metrics">
      <span>上证 <strong style="color:var(--red)">+0.67%</strong></span>
      <span>涨停 147</span>
      <span>情绪 <strong style="color:var(--green)">58%</strong></span>
      <span>电力主线 · 6板大唐</span>
      <span class="chip chip-green">持仓 北华+立讯</span>
    </div>
    <div class="arrow">→</div>
  </a>

  <a href="05-12.html" class="day-card">
    <div class="date">5/12<span class="wd"> 周二</span></div>
    <div class="metrics">
      <span>上证 <strong style="color:var(--green)">-0.25%</strong></span>
      <span>涨停 94</span>
      <span>情绪 <strong style="color:var(--red)">25%</strong></span>
      <span>低迷 · 连板分层开放</span>
      <span class="chip chip-amber">持仓 北华</span>
    </div>
    <div class="arrow">→</div>
  </a>
</div>

</div>

<div class="footer">弈沐资本 · 交易复盘系统</div>

</body>
</html>
